<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image.prod.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/fcor/aframe-gesture-detector-component@master/dist/aframe-gesture-detector-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        gesture-detector
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane 
                src="./bear.png" 
                class="clickable"
                gesture-handler="listensTo: absent"
                position="0 0 0" 
                height="1" 
                width="1" 
                rotation="0 0 0" 
                material="transparent: true; opacity: 1;">
            </a-plane>
        </a-entity>
        
    </a-scene>

</body>
</html>
